/**:
  ros__parameters:
    surface_mapping_setting_type: erl::gp_sdf::GpOccSurfaceMapping<float, 2>::Setting
    surface_mapping_setting_file: config/template/gp_occ_mapping_2d_float.yaml
    surface_mapping_type: erl::gp_sdf::GpOccSurfaceMapping<float, 2>
    sdf_mapping_setting_file: config/template/sdf_mapping_2d_float.yaml
    odom:
      enabled: false
      topic:
        path: /jackal_velocity_controller/odom
      msg_type: transform_stamped  # "odometry" or "transform_stamped"
      queue_size: 200
    world_frame: map
    sensor_frame: front_laser
    scan:
      topic:
        path: /front/scan
      type: laser
      frame_type: erl::geometry::LidarFrame2D<float>
      frame_setting_file: config/sensors/lidar_frame_2d.yaml
      stride: 1
      convert_to_points: false
      in_local_frame: true
      depth_scale: 0.001
    paint_surface:
      color_from_scan: false
      topic:
        path: ""
      overwrite: true
    publish_tree:
      enabled: false
      binary: true
      frequency: 5.0
      topic:
        path: surface_mapping_tree
    publish_surface_points:
      enabled: false
      frequency: 5.0
      topic:
        path: surface_points
    publish_mesh:
      enabled: false
      frequency: 1.0
      topic:
        path: mesh
    update_time_topic:
      path: update_time
    query_time_topic:
      path: query_time
    sdf_query_service:
      path: sdf_query
    occ_query_service:
      path: occ_query
    save_map_service:
      path: save_map
    load_map_service:
      path: load_map
    save_mesh_service:
      path: save_mesh
